syntax = "proto3";

option java_multiple_files = true;
option java_package = "notification";
option java_outer_classname = "NotificationServiceOuterClass";

package notification;

service NotificationService {
  rpc SendConfirmation(ConfirmationRequest) returns (NotificationResponse);
  rpc SendPaymentFailureNotice(NoticeRequest) returns (NotificationResponse);
}

message ConfirmationRequest {
  string patientId = 1;
  string appointmentId = 2;
  string message = 3;
}

message NoticeRequest {
  string patientId = 1;
  string reason = 2;
  string message = 3;
}

message NotificationResponse {
  string notificationId = 1;
  string status = 2; // SENT, FAILED
  string errorMessage = 3;
}
