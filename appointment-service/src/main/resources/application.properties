spring.application.name=appointment-service
server.port=4002

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

grpc.client.payment-service.address=static://payment-service:9006
grpc.client.payment-service.negotiationType=PLAINTEXT

grpc.client.notification-service.address=static://notification-service:9008
grpc.client.notification-service.negotiationType=PLAINTEXT

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
