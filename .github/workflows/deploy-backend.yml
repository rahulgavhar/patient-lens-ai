name: Build & Deploy Backend (AWS EKS)

on:
  push:
    branches: [ main ]
    paths:
      - 'auth-service/**'
      - 'patient-service/**'
      - 'doctor-service/**'
      - 'billing-service/**'
      - 'appointment-service/**'
      - 'payment-service/**'
      - 'notification-service/**'
      - 'api-gateway/**'
      - 'infrastructure/**'
      - 'pom.xml'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Package Microservices
      run: |
        for service in auth-service api-gateway patient-service doctor-service appointment-service billing-service analytics-service payment-service notification-service medical-record-service; do
          echo "================================"
          echo "Building $service..."
          echo "================================"
          mvn -f "$service/pom.xml" clean package -DskipTests
        done

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Docker Images
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build gateway image
        docker build -t $ECR_REGISTRY/patient-lens-gateway:$IMAGE_TAG ./api-gateway
        docker push $ECR_REGISTRY/patient-lens-gateway:$IMAGE_TAG
        
        # Build appointment service image
        docker build -t $ECR_REGISTRY/patient-lens-appointment:$IMAGE_TAG ./appointment-service
        docker push $ECR_REGISTRY/patient-lens-appointment:$IMAGE_TAG
        
        # Build billing service image
        docker build -t $ECR_REGISTRY/patient-lens-billing:$IMAGE_TAG ./billing-service
        docker push $ECR_REGISTRY/patient-lens-billing:$IMAGE_TAG

    - name: Update Kubernetes Manifests
      run: |
        echo "Updating deployment image references to: ${{ github.sha }}"
        # In a real environment, we would run kustomize or envsubst and apply to EKS
        # aws eks update-kubeconfig --name patient-lens-cluster
        # kubectl apply -f infrastructure/k8s/
