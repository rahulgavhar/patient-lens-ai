name: Build & Deploy Backend (Azure VM)

on:
  push:
    branches: [ main ]
    paths:
      - 'auth-service/**'
      - 'patient-service/**'
      - 'doctor-service/**'
      - 'billing-service/**'
      - 'appointment-service/**'
      - 'payment-service/**'
      - 'notification-service/**'
      - 'api-gateway/**'
      - 'infrastructure/**'
      - 'pom.xml'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Package Microservices
      run: |
        for service in auth-service api-gateway patient-service doctor-service appointment-service billing-service analytics-service payment-service notification-service medical-record-service; do
          echo "================================"
          echo "Building $service..."
          echo "================================"
          mvn -f "$service/pom.xml" clean package -DskipTests
        done

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build, Tag, and Push Docker Images
      env:
        ACR_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build gateway image
        docker build -t $ACR_REGISTRY/patient-lens-gateway:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-gateway:latest ./api-gateway
        docker push $ACR_REGISTRY/patient-lens-gateway --all-tags
        
        # Build appointment service image
        docker build -t $ACR_REGISTRY/patient-lens-appointment:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-appointment:latest ./appointment-service
        docker push $ACR_REGISTRY/patient-lens-appointment --all-tags
        
        # Build billing service image
        docker build -t $ACR_REGISTRY/patient-lens-billing:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-billing:latest ./billing-service
        docker push $ACR_REGISTRY/patient-lens-billing --all-tags

        # Build auth service image
        docker build -t $ACR_REGISTRY/patient-lens-auth:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-auth:latest ./auth-service
        docker push $ACR_REGISTRY/patient-lens-auth --all-tags

        # Build patient service image
        docker build -t $ACR_REGISTRY/patient-lens-patient:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-patient:latest ./patient-service
        docker push $ACR_REGISTRY/patient-lens-patient --all-tags

        # Build doctor service image
        docker build -t $ACR_REGISTRY/patient-lens-doctor:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-doctor:latest ./doctor-service
        docker push $ACR_REGISTRY/patient-lens-doctor --all-tags

        # Build payment service image
        docker build -t $ACR_REGISTRY/patient-lens-payment:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-payment:latest ./payment-service
        docker push $ACR_REGISTRY/patient-lens-payment --all-tags

        # Build analytics service image
        docker build -t $ACR_REGISTRY/patient-lens-analytics:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-analytics:latest ./analytics-service
        docker push $ACR_REGISTRY/patient-lens-analytics --all-tags

        # Build notification service image
        docker build -t $ACR_REGISTRY/patient-lens-notification:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-notification:latest ./notification-service
        docker push $ACR_REGISTRY/patient-lens-notification --all-tags

        # Build ai service image
        docker build -t $ACR_REGISTRY/patient-lens-ai:$IMAGE_TAG -t $ACR_REGISTRY/patient-lens-ai:latest ./ai-service
        docker push $ACR_REGISTRY/patient-lens-ai --all-tags

    - name: Deploy to Azure VM via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          # 1. Login to ACR on the VM
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
          
          # 2. Navigate to deployment directory (assuming it exists on the VM)
          cd /opt/patient-lens/infrastructure
          
          # 3. Export new image tag for docker-compose to pick up
          export IMAGE_TAG=${{ github.sha }}
          export ACR_REGISTRY=${{ secrets.ACR_LOGIN_SERVER }}
          
          # 4. Pull the latest images and recreate containers
          docker compose pull
          docker compose up -d --remove-orphans
          
          # 5. Clean up dangling images to save space
          docker image prune -f
