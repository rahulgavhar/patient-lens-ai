name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Package Backend Microservices
      run: |
        for service in auth-service api-gateway patient-service doctor-service appointment-service billing-service analytics-service payment-service notification-service medical-record-service; do
          echo "================================"
          echo "Building $service..."
          echo "================================"
          mvn -f "$service/pom.xml" clean package -DskipTests
        done

    - name: Setup Environment for AI Service
      run: cp ai-service/.env.example ai-service/.env

    - name: Build and Start Services
      run: docker compose up -d --build

    - name: Wait for API Gateway Health
      run: |
        echo "Waiting for API Gateway to be healthy..."
        timeout=180
        elapsed=0
        until curl -s -f http://localhost:4004/actuator/health | grep -q '"status":"UP"'; do
          if [ $elapsed -ge $timeout ]; then
            echo "Timeout waiting for API Gateway to become healthy."
            docker compose logs
            exit 1
          fi
          echo "API Gateway is not ready yet. Retrying in 5 seconds... ($elapsed/$timeout s)"
          sleep 5
          elapsed=$((elapsed+5))
        done
        echo "API Gateway is healthy and up!"

    - name: Run Integration Tests
      run: |
        mvn -f integration-tests/pom.xml clean test

    - name: Stop Services and Clean Up
      if: always()
      run: docker compose down -v
