syntax = "proto3";

package patient.events;
option java_multiple_files = true;

// Patient event for Kafka messaging
message PatientEvent {
  string patientId = 1;        // UUID as string
  string name = 2;             // Patient full name
  string email = 3;            // Patient email
  string eventType = 4;        // Type of event, e.g., "PATIENT_CREATED"
  int64 timestamp = 5;         // Epoch milliseconds for event time
}