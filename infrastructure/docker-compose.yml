services:
  postgres:
    image: postgres:17
    container_name: patient-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: default-db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d default-db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - patient-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: patient-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - patient-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: patient-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - patient-network

  auth-service:
    image: ${ACR_REGISTRY}/patient-lens-auth:${IMAGE_TAG}
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4005"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
    networks:
      - patient-network

  billing-service:
    image: ${ACR_REGISTRY}/patient-lens-billing:${IMAGE_TAG}
    container_name: billing-service
    restart: unless-stopped
    depends_on:
      - kafka
    expose:
      - "4001"
      - "9001"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - patient-network

  doctor-service:
    image: ${ACR_REGISTRY}/patient-lens-doctor:${IMAGE_TAG}
    container_name: doctor-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/doctor-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
    networks:
      - patient-network

  patient-service:
    image: ${ACR_REGISTRY}/patient-lens-patient:${IMAGE_TAG}
    container_name: patient-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      billing-service:
        condition: service_started
    expose:
      - "4000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
    networks:
      - patient-network

  appointment-service:
    image: ${ACR_REGISTRY}/patient-lens-appointment:${IMAGE_TAG}
    container_name: appointment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    expose:
      - "4002"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appointment-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - patient-network

  payment-service:
    image: ${ACR_REGISTRY}/patient-lens-payment:${IMAGE_TAG}
    container_name: payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    expose:
      - "4006"
      - "9006"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - patient-network

  notification-service:
    image: ${ACR_REGISTRY}/patient-lens-notification:${IMAGE_TAG}
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    expose:
      - "4008"
      - "9008"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - patient-network

  analytics-service:
    image: ${ACR_REGISTRY}/patient-lens-analytics:${IMAGE_TAG}
    container_name: analytics-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    expose:
      - "4009"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/analytics-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - patient-network

  ai-service:
    image: ${ACR_REGISTRY}/patient-lens-ai:${IMAGE_TAG}
    container_name: ai-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4010"
    env_file:
      - ./ai-service.env
    environment:
      DATABASE_URL: postgresql://admin_user:password@postgres:5432/ai-service-db
      EMBEDDING_PROVIDER: local
    networks:
      - patient-network

  api-gateway:
    image: ${ACR_REGISTRY}/patient-lens-gateway:${IMAGE_TAG}
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - patient-service
      - billing-service
      - doctor-service
      - appointment-service
      - ai-service
    ports:
      - "4004:4004"
    environment:
      AUTH_SERVICE_URL: http://auth-service:4005
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - patient-network

volumes:
  postgres-data:

networks:
  patient-network:
    driver: bridge